<template>
    <div class="dashboard-shell">
        <div class="slds-grid slds-grid_align-end slds-m-bottom_small">
            <button class="slds-button slds-button_neutral" onclick={handleRefresh}>
                <svg class="slds-button__icon slds-button__icon_left" aria-hidden="true">
                    <use xlink:href={refreshIconHref}></use>
                </svg>
                Refresh
            </button>
        </div>

        <template if:true={loading}>
            <div class="slds-spinner_container dashboard-spinner-shell">
                <div class="slds-spinner slds-spinner_brand slds-spinner_medium" role="status">
                    <span class="slds-assistive-text">Loading</span>
                    <div class="slds-spinner__dot-a"></div>
                    <div class="slds-spinner__dot-b"></div>
                </div>
            </div>
        </template>

        <template if:true={data}>
            <div class="slds-grid slds-wrap slds-gutters_small slds-m-bottom_medium">
                <template for:each={engagementTiles} for:item="tile">
                    <div key={tile.key} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                        <article class={tile.className}>
                            <div class="slds-tile__detail">
                                <p class="slds-text-title_caps kpi-eyebrow">{tile.eyebrow}</p>
                                <h3 class="slds-text-title_bold">{tile.label}</h3>
                                <div class="slds-text-heading_large kpi-value">{tile.value}</div>
                                <p class="slds-text-body_small slds-text-color_weak">{tile.sub}</p>
                                <template if:true={tile.chartConfig}>
                                    <div class="sparkline-shell">
                                        <c-cert-game-chart config={tile.chartConfig} height="26"></c-cert-game-chart>
                                    </div>
                                </template>
                            </div>
                        </article>
                    </div>
                </template>
            </div>

            <div class="slds-grid slds-wrap slds-gutters_small slds-m-bottom_medium">
                <template for:each={contentTiles} for:item="tile">
                    <div key={tile.key} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-4">
                        <article class={tile.className}>
                            <div class="slds-tile__detail">
                                <p class="slds-text-title_caps kpi-eyebrow">{tile.eyebrow}</p>
                                <h3 class="slds-text-title_bold">{tile.label}</h3>
                                <div class="slds-text-heading_large kpi-value">{tile.value}</div>
                                <p class="slds-text-body_small slds-text-color_weak">{tile.sub}</p>
                                <template if:true={tile.chartConfig}>
                                    <div class="sparkline-shell">
                                        <c-cert-game-chart config={tile.chartConfig} height="26"></c-cert-game-chart>
                                    </div>
                                </template>
                            </div>
                        </article>
                    </div>
                </template>
            </div>

            <article class="slds-card dashboard-card slds-m-bottom_medium">
                <div class="slds-card__header slds-grid">
                    <header class="slds-media slds-media_center slds-has-flexi-truncate">
                        <div class="slds-media__figure">
                            <span class="slds-icon_container slds-icon-standard-report" title="Activity — Last 30 Days">
                                <svg class="slds-icon slds-icon_small" aria-hidden="true">
                                    <use xlink:href={trendCardIconHref}></use>
                                </svg>
                            </span>
                        </div>
                        <div class="slds-media__body">
                            <h2 class="slds-card__header-title">
                                <span class="slds-card__header-link slds-truncate" title="Activity — Last 30 Days">Activity — Last 30 Days</span>
                            </h2>
                            <p class="slds-text-body_small slds-text-color_weak">Games started and answers per day</p>
                        </div>
                    </header>
                </div>
                <div class="slds-card__body slds-card__body_inner">
                    <c-cert-game-chart config={activityChartConfig} height="280"></c-cert-game-chart>
                </div>
            </article>

            <div class="slds-grid slds-wrap slds-gutters_medium slds-m-bottom_medium">
                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                    <article class="slds-card dashboard-card">
                        <div class="slds-card__header slds-grid">
                            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                <div class="slds-media__figure">
                                    <span class="slds-icon_container slds-icon-standard-metrics" title="Usage">
                                        <svg class="slds-icon slds-icon_small" aria-hidden="true">
                                            <use xlink:href={usageCardIconHref}></use>
                                        </svg>
                                    </span>
                                </div>
                                <div class="slds-media__body">
                                    <h2 class="slds-card__header-title">
                                        <span class="slds-card__header-link slds-truncate">Usage — {data.usage.period}</span>
                                    </h2>
                                </div>
                            </header>
                        </div>
                        <div class="slds-card__body slds-card__body_inner">
                            <template for:each={usageBars} for:item="row">
                                <div key={row.key} class="usage-row">
                                    <div class="slds-grid slds-grid_vertical-align-center slds-grid_align-spread usage-row__header">
                                        <div class="metric-label-wrap">
                                            <span>{row.label}</span>
                                            <button class="slds-button slds-button_icon slds-button_icon-x-small metric-help-trigger" aria-describedby={row.key}>
                                                <svg class="slds-button__icon" aria-hidden="true">
                                                    <use xlink:href={dropdownIconHref}></use>
                                                </svg>
                                            </button>
                                            <div id={row.key} class="slds-popover slds-popover_tooltip slds-nubbin_bottom-left metric-tooltip" role="tooltip">
                                                <div class="slds-popover__body">{row.help}</div>
                                            </div>
                                        </div>
                                        <span class="slds-text-body_small slds-text-color_weak">{row.text}</span>
                                    </div>
                                    <template if:true={row.hasQuota}>
                                        <div class="slds-progress-bar usage-meter" aria-valuemax="100" aria-valuemin="0" aria-valuenow={row.pct} role="progressbar">
                                            <span class={row.barClass} data-width={row.pct}></span>
                                        </div>
                                        <template if:true={row.isEmpty}>
                                            <p class="slds-text-body_small slds-text-color_weak usage-empty-note">No usage yet this period.</p>
                                        </template>
                                    </template>
                                </div>
                            </template>
                        </div>
                        <footer class="slds-card__footer usage-footer">
                            <div class="slds-grid slds-wrap slds-gutters_small">
                                <template for:each={usageFooter} for:item="item">
                                    <div key={item.key} class="slds-col slds-size_1-of-3">
                                        <div class="slds-text-title_caps">{item.label}</div>
                                        <div class="slds-text-heading_small">{item.value}</div>
                                    </div>
                                </template>
                            </div>
                        </footer>
                    </article>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                    <article class="slds-card dashboard-card">
                        <div class="slds-card__header slds-grid">
                            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                <div class="slds-media__figure">
                                    <span class="slds-icon_container slds-icon-standard-knowledge" title="Question Bank Health">
                                        <svg class="slds-icon slds-icon_small" aria-hidden="true">
                                            <use xlink:href={knowledgeIconHref}></use>
                                        </svg>
                                    </span>
                                </div>
                                <div class="slds-media__body">
                                    <h2 class="slds-card__header-title">
                                        <span class="slds-card__header-link slds-truncate">Question Bank Health</span>
                                    </h2>
                                </div>
                            </header>
                        </div>
                        <div class="slds-card__body slds-card__body_inner">
                            <div class="slds-path question-path">
                                <div class="slds-grid slds-path__track">
                                    <div class="slds-grid slds-path__scroller-container">
                                        <div class="slds-path__scroller">
                                            <div class="slds-path__scroller_inner">
                                                <ul class="slds-path__nav" role="listbox" aria-orientation="horizontal">
                                                    <template for:each={questionPathSteps} for:item="step">
                                                        <li key={step.key} class={step.className} role="presentation">
                                                            <a class="slds-path__link" href="#" role="option" aria-selected={step.ariaSelected}>
                                                                <span class="slds-path__title">{step.label} ({step.value})</span>
                                                            </a>
                                                        </li>
                                                    </template>
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="slds-grid slds-wrap slds-gutters_small slds-m-top_medium">
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <article class="slds-card health-callout health-callout_error">
                                        <div class="slds-card__body slds-card__body_inner">
                                            <div class="slds-media">
                                                <div class="slds-media__figure">
                                                    <svg class="slds-icon slds-icon_small slds-icon-text-error" aria-hidden="true">
                                                        <use xlink:href={warningIconHref}></use>
                                                    </svg>
                                                </div>
                                                <div class="slds-media__body">
                                                    <h3 class="slds-text-title_bold">Broken Citations</h3>
                                                    <div class="slds-text-heading_medium">{brokenCitationCard.count}</div>
                                                    <button class="slds-button slds-button_neutral slds-m-top_small" data-focus={brokenCitationCard.focus} onclick={handleReviewHealth}>{brokenCitationCard.buttonLabel}</button>
                                                </div>
                                            </div>
                                        </div>
                                    </article>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <article class="slds-card health-callout health-callout_warning">
                                        <div class="slds-card__body slds-card__body_inner">
                                            <div class="slds-media">
                                                <div class="slds-media__figure">
                                                    <svg class="slds-icon slds-icon_small slds-icon-text-warning" aria-hidden="true">
                                                        <use xlink:href={qualityIconHref}></use>
                                                    </svg>
                                                </div>
                                                <div class="slds-media__body">
                                                    <h3 class="slds-text-title_bold">Low Quality</h3>
                                                    <div class="slds-text-heading_medium">{lowQualityCard.count}</div>
                                                    <button class="slds-button slds-button_neutral slds-m-top_small" data-focus={lowQualityCard.focus} onclick={handleReviewHealth}>{lowQualityCard.buttonLabel}</button>
                                                </div>
                                            </div>
                                        </div>
                                    </article>
                                </div>
                            </div>
                        </div>
                    </article>
                </div>
            </div>

            <div class="slds-grid slds-wrap slds-gutters_medium slds-m-bottom_medium">
                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                    <article class="slds-card dashboard-card">
                        <div class="slds-card__header slds-grid">
                            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                <div class="slds-media__figure">
                                    <span class="slds-icon_container slds-icon-standard-report" title="Top Exams">
                                        <svg class="slds-icon slds-icon_small" aria-hidden="true">
                                            <use xlink:href={trendCardIconHref}></use>
                                        </svg>
                                    </span>
                                </div>
                                <div class="slds-media__body">
                                    <h2 class="slds-card__header-title">
                                        <span class="slds-card__header-link slds-truncate">Top Exams</span>
                                    </h2>
                                </div>
                            </header>
                        </div>
                        <div class="slds-card__body slds-card__body_inner">
                            <template if:true={hasTopExams}>
                                <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_fixed-layout">
                                    <thead>
                                        <tr class="slds-line-height_reset">
                                            <th scope="col">
                                                <button class="slds-button slds-button_reset sort-button" data-field="examName" onclick={handleSort}>
                                                    <span class="slds-truncate">Exam</span>
                                                </button>
                                            </th>
                                            <th scope="col" class="slds-text-align_right">
                                                <button class="slds-button slds-button_reset sort-button" data-field="games" onclick={handleSort}>
                                                    <span class="slds-truncate">Games</span>
                                                </button>
                                            </th>
                                            <th scope="col" class="slds-text-align_right">
                                                <button class="slds-button slds-button_reset sort-button" data-field="answers" onclick={handleSort}>
                                                    <span class="slds-truncate">Answers</span>
                                                </button>
                                            </th>
                                            <th scope="col">Volume</th>
                                            <th scope="col" class="slds-cell-shrink"></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={topExamRows} for:item="row">
                                            <tr key={row.examId}>
                                                <th scope="row">
                                                    <button class="slds-button slds-button_reset slds-text-link" data-id={row.examId} onclick={handleExamOpen}>{row.examName}</button>
                                                </th>
                                                <td class="slds-text-align_right">{row.gamesText}</td>
                                                <td class="slds-text-align_right">{row.answersText}</td>
                                                <td>
                                                    <div class="slds-progress-bar top-exam-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100">
                                                        <span class="slds-progress-bar__value meter-fill meter-fill_brand" data-width={row.volumePct}></span>
                                                    </div>
                                                </td>
                                                <td class="slds-cell-shrink">
                                                    <div class={row.menuClass}>
                                                        <button class="slds-button slds-button_icon slds-button_icon-border-filled" data-id={row.examId} onclick={handleExamMenuToggle}>
                                                            <svg class="slds-button__icon" aria-hidden="true">
                                                                <use xlink:href={dropdownIconHref}></use>
                                                            </svg>
                                                        </button>
                                                        <div class="slds-dropdown slds-dropdown_right">
                                                            <ul class="slds-dropdown__list" role="menu">
                                                                <li class="slds-dropdown__item" role="presentation">
                                                                    <button class="slds-button slds-button_reset slds-dropdown__item-action" role="menuitem" data-id={row.examId} data-action="details" onclick={handleExamAction}>View details</button>
                                                                </li>
                                                                <li class="slds-dropdown__item" role="presentation">
                                                                    <button class="slds-button slds-button_reset slds-dropdown__item-action" role="menuitem" data-id={row.examId} data-action="leaderboard" onclick={handleExamAction}>Open leaderboard</button>
                                                                </li>
                                                            </ul>
                                                        </div>
                                                    </div>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </template>
                            <template if:false={hasTopExams}>
                                <div class="slds-notify slds-notify_alert slds-theme_info" role="alert">
                                    <span class="slds-assistive-text">Info</span>
                                    <h2>No play activity in the last 7 days.</h2>
                                </div>
                            </template>
                        </div>
                    </article>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                    <article class="slds-card dashboard-card">
                        <div class="slds-card__header slds-grid">
                            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                <div class="slds-media__figure">
                                    <span class="slds-icon_container slds-icon-standard-scan-card" title="Recent Generation Jobs">
                                        <svg class="slds-icon slds-icon_small" aria-hidden="true">
                                            <use xlink:href={jobsCardIconHref}></use>
                                        </svg>
                                    </span>
                                </div>
                                <div class="slds-media__body">
                                    <h2 class="slds-card__header-title">
                                        <span class="slds-card__header-link slds-truncate">Recent Generation Jobs</span>
                                    </h2>
                                </div>
                            </header>
                        </div>
                        <div class="slds-card__body slds-card__body_inner">
                            <template if:true={hasGenerations}>
                                <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                                    <thead>
                                        <tr>
                                            <th>When</th>
                                            <th>Provider</th>
                                            <th>Status</th>
                                            <th class="slds-text-align_right">Req/Gen</th>
                                            <th class="slds-text-align_right">Cost</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={data.recentGenerations} for:item="job">
                                            <tr key={job.id}>
                                                <td><lightning-formatted-date-time value={job.createdAt} year="numeric" month="short" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time></td>
                                                <td>{job.provider}</td>
                                                <td>
                                                    <span class="slds-badge">{job.status}</span>
                                                </td>
                                                <td class="slds-text-align_right">{job.requested}/{job.generated}</td>
                                                <td class="slds-text-align_right">{job.costUsd}</td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </template>
                            <template if:false={hasGenerations}>
                                <div class="generation-empty-state">
                                    <div class="slds-illustration slds-illustration_small" aria-hidden="true">
                                        <div class="empty-illustration-mark">
                                            <svg class="slds-icon slds-icon_large slds-icon-text-default" aria-hidden="true">
                                                <use xlink:href={jobsCardIconHref}></use>
                                            </svg>
                                        </div>
                                    </div>
                                    <h3 class="slds-text-heading_small slds-m-top_medium">No generation jobs yet.</h3>
                                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">Question generation runs will appear here with provider, status, and cost.</p>
                                    <button class="slds-button slds-button_brand slds-m-top_medium" onclick={handleRunGenerationJob}>Run First Generation Job</button>
                                </div>
                            </template>
                        </div>
                    </article>
                </div>
            </div>

            <div class="slds-grid slds-wrap slds-gutters_medium slds-m-bottom_medium">
                <div class="slds-col slds-size_1-of-1 slds-large-size_2-of-3">
                    <article class="slds-card dashboard-card">
                        <div class="slds-card__header slds-grid">
                            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                <div class="slds-media__figure">
                                    <span class="slds-icon_container slds-icon-standard-maintenance-plan" title="Recent Errors / Warnings">
                                        <svg class="slds-icon slds-icon_small" aria-hidden="true">
                                            <use xlink:href={errorCardIconHref}></use>
                                        </svg>
                                    </span>
                                </div>
                                <div class="slds-media__body">
                                    <h2 class="slds-card__header-title">
                                        <span class="slds-card__header-link slds-truncate">Recent Errors / Warnings</span>
                                    </h2>
                                </div>
                            </header>
                        </div>
                        <div class="slds-card__body slds-card__body_inner">
                            <template if:true={hasErrors}>
                                <template for:each={visibleErrorGroups} for:item="group">
                                    <div key={group.key} class={group.cardClass}>
                                        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-start slds-wrap">
                                            <div class="slds-col slds-grow">
                                                <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_x-small">
                                                    <span class={group.severityClass}>{group.level}</span>
                                                    <button class="slds-button slds-button_reset slds-text-link slds-m-left_small" data-key={group.key} onclick={handleErrorGroupOpen}>{group.title}</button>
                                                </div>
                                                <p class="slds-text-body_small">{group.message}</p>
                                                <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">{group.expandLabel} · last seen <lightning-formatted-date-time value={group.lastSeen} year="numeric" month="short" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time></p>
                                            </div>
                                            <div class="slds-col slds-no-flex error-actions">
                                                <button class="slds-button slds-button_icon slds-button_icon-border-filled slds-m-right_x-small" data-key={group.key} onclick={handleErrorExpand}>
                                                    <svg class="slds-button__icon" aria-hidden="true">
                                                        <use xlink:href={chevronIconHref}></use>
                                                    </svg>
                                                </button>
                                                <div class={group.menuClass}>
                                                    <button class="slds-button slds-button_icon slds-button_icon-border-filled" data-key={group.key} onclick={handleErrorMenuToggle}>
                                                        <svg class="slds-button__icon" aria-hidden="true">
                                                            <use xlink:href={dropdownIconHref}></use>
                                                        </svg>
                                                    </button>
                                                    <div class="slds-dropdown slds-dropdown_right">
                                                        <ul class="slds-dropdown__list" role="menu">
                                                            <li class="slds-dropdown__item" role="presentation">
                                                                <button class="slds-button slds-button_reset slds-dropdown__item-action" role="menuitem" data-key={group.key} data-action="acknowledge" onclick={handleErrorAction}>Acknowledge</button>
                                                            </li>
                                                            <li class="slds-dropdown__item" role="presentation">
                                                                <button class="slds-button slds-button_reset slds-dropdown__item-action" role="menuitem" data-key={group.key} data-action="mute" onclick={handleErrorAction}>Mute pattern</button>
                                                            </li>
                                                        </ul>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <template if:true={group.expanded}>
                                            <ul class="slds-has-dividers_top-space slds-m-top_small">
                                                <template for:each={group.occurrences} for:item="occurrence">
                                                    <li key={occurrence.id} class="slds-item slds-p-vertical_x-small">
                                                        <lightning-formatted-date-time value={occurrence.occurredAt} year="numeric" month="short" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                                                        <span class="slds-text-color_weak slds-m-left_small">{occurrence.message}</span>
                                                    </li>
                                                </template>
                                            </ul>
                                        </template>
                                    </div>
                                </template>

                                <template if:true={hasOverflowErrors}>
                                    <div class="slds-m-top_small">
                                        <button class="slds-button slds-button_reset slds-text-link" onclick={handleViewAllErrors}>View all in System Log</button>
                                    </div>
                                </template>
                            </template>
                            <template if:false={hasErrors}>
                                <div class="slds-notify slds-notify_alert slds-theme_success" role="alert">
                                    <span class="slds-assistive-text">Success</span>
                                    <h2>No recent errors or warnings.</h2>
                                </div>
                            </template>
                        </div>
                    </article>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3">
                    <article class="slds-card dashboard-card">
                        <div class="slds-card__header slds-grid">
                            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                <div class="slds-media__figure">
                                    <span class="slds-icon_container slds-icon-standard-report" title="Recent License Events">
                                        <svg class="slds-icon slds-icon_small" aria-hidden="true">
                                            <use xlink:href={trendCardIconHref}></use>
                                        </svg>
                                    </span>
                                </div>
                                <div class="slds-media__body">
                                    <h2 class="slds-card__header-title">
                                        <span class="slds-card__header-link slds-truncate">Recent License Events</span>
                                    </h2>
                                </div>
                            </header>
                        </div>
                        <div class="slds-card__body slds-card__body_inner">
                            <template if:true={hasLicense}>
                                <ul class="slds-has-dividers_top-space">
                                    <template for:each={data.recentLicense} for:item="licenseEvent">
                                        <li key={licenseEvent.id} class="slds-item slds-p-vertical_small">
                                            <div class="slds-text-title_bold">{licenseEvent.eventType}</div>
                                            <div class="slds-text-body_small">{licenseEvent.tenantName}</div>
                                            <div class="slds-text-body_small slds-text-color_weak">
                                                <lightning-formatted-date-time value={licenseEvent.occurredAt} year="numeric" month="short" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                            </template>
                            <template if:false={hasLicense}>
                                <div class="slds-notify slds-notify_alert slds-theme_info" role="alert">
                                    <span class="slds-assistive-text">Info</span>
                                    <h2>No billing events recorded yet.</h2>
                                </div>
                            </template>
                        </div>
                    </article>
                </div>
            </div>

            <template if:true={hasTenants}>
                <article class="slds-card dashboard-card">
                    <div class="slds-card__header slds-grid">
                        <header class="slds-media slds-media_center slds-has-flexi-truncate">
                            <div class="slds-media__body">
                                <h2 class="slds-card__header-title">
                                    <span class="slds-card__header-link slds-truncate">Tenant Overview</span>
                                </h2>
                            </div>
                        </header>
                    </div>
                    <div class="slds-card__body slds-card__body_inner">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_fixed-layout">
                            <thead>
                                <tr>
                                    <th>Workspace</th>
                                    <th>Plan</th>
                                    <th>Status</th>
                                    <th class="slds-text-align_right">Players</th>
                                    <th class="slds-text-align_right">Study plans</th>
                                    <th class="slds-text-align_right">Q this period</th>
                                    <th class="slds-text-align_right">Est. MRR</th>
                                    <th>Trial ends</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={data.tenants} for:item="tenant">
                                    <tr key={tenant.id}>
                                        <td>
                                            <div>{tenant.name}</div>
                                            <div class="slds-text-body_small slds-text-color_weak">{tenant.slackTeamId}</div>
                                        </td>
                                        <td><span class="slds-badge">{tenant.plan}</span></td>
                                        <td>{tenant.status}</td>
                                        <td class="slds-text-align_right">{tenant.playerCount}</td>
                                        <td class="slds-text-align_right">{tenant.activeStudyPlans}</td>
                                        <td class="slds-text-align_right">{tenant.questionsThisPeriod}</td>
                                        <td class="slds-text-align_right">{tenant.mrrUsd}</td>
                                        <td><lightning-formatted-date-time value={tenant.trialEndsAt}></lightning-formatted-date-time></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </article>
            </template>
        </template>

        <template if:true={error}>
            <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                <span class="slds-assistive-text">Error</span>
                <h2>{error}</h2>
            </div>
        </template>

        <template if:true={selectedExamHasData}>
            <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close" title="Close" onclick={handleCloseModal}>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium">{selectedExam.examName}</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-text-title_caps">Games</div>
                                <div class="slds-text-heading_medium">{selectedExam.gamesText}</div>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-text-title_caps">Answers</div>
                                <div class="slds-text-heading_medium">{selectedExam.answersText}</div>
                            </div>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={handleCloseModal}>Close</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <template if:true={selectedErrorGroupHasData}>
            <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close" title="Close" onclick={handleCloseModal}>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium">{selectedErrorGroup.title}</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p class="slds-text-body_regular slds-m-bottom_small">{selectedErrorGroup.message}</p>
                        <ul class="slds-has-dividers_top-space">
                            <template for:each={selectedErrorGroup.occurrences} for:item="occurrence">
                                <li key={occurrence.id} class="slds-item slds-p-vertical_small">
                                    <div class="slds-text-body_small slds-text-color_weak">
                                        <lightning-formatted-date-time value={occurrence.occurredAt} year="numeric" month="short" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                                    </div>
                                    <div class="slds-text-body_small">{occurrence.message}</div>
                                </li>
                            </template>
                        </ul>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={handleCloseModal}>Close</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
