<template>
    <lightning-card title="Cert Game — KPI Dashboard" icon-name="utility:dashboard">
        <lightning-button slot="actions" label="Refresh" icon-name="utility:refresh"
                          onclick={handleRefresh}></lightning-button>
        <template if:true={loading}>
            <div class="slds-p-around_medium">
                <lightning-spinner alternative-text="Loading"></lightning-spinner>
            </div>
        </template>

        <template if:true={data}>
            <!-- Tenant header -->
            <template if:true={data.tenant}>
                <div class="slds-p-horizontal_medium slds-p-bottom_small">
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_2-of-3">
                            <h2 class="slds-text-heading_medium">{data.tenant.name}</h2>
                            <p class="slds-text-color_weak slds-text-body_small">
                                Workspace: <code>{data.tenant.slackTeamId}</code>
                                <template if:true={data.tenant.stripeCustomerId}>
                                    · Stripe: <code>{data.tenant.stripeCustomerId}</code>
                                </template>
                            </p>
                        </div>
                        <div class="slds-col slds-size_1-of-3 slds-text-align_right">
                            <lightning-badge label={data.tenant.plan} class="slds-theme_inverse slds-m-right_x-small"></lightning-badge>
                            <lightning-badge label={data.tenant.status}></lightning-badge>
                            <div class="slds-text-color_weak slds-text-body_small slds-m-top_x-small">
                                Est. MRR: <strong>${data.tenant.mrrUsd}</strong>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- KPIs strip -->
            <div class="slds-p-horizontal_medium">
                <div class="slds-grid slds-wrap slds-gutters">
                    <template for:each={kpiTiles} for:item="k">
                        <div key={k.label} class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4 slds-p-vertical_x-small">
                            <div class="slds-box slds-box_x-small slds-theme_default">
                                <p class="slds-text-color_weak slds-text-body_small">{k.label}</p>
                                <p class="slds-text-heading_medium">{k.value}</p>
                                <template if:true={k.sub}>
                                    <p class="slds-text-color_weak slds-text-body_small">{k.sub}</p>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Usage bars -->
            <template if:true={data.usage}>
                <div class="slds-p-around_medium">
                    <h3 class="slds-text-title_caps slds-m-bottom_x-small">Usage — {data.usage.period}</h3>
                    <template for:each={usageBars} for:item="u">
                        <div key={u.label} class="slds-m-bottom_x-small">
                            <div class="slds-grid slds-grid_align-spread slds-text-body_small">
                                <span>{u.label}</span>
                                <span class="slds-text-color_weak">{u.text}</span>
                            </div>
                            <lightning-progress-bar value={u.pct} variant={u.variant} size="medium"></lightning-progress-bar>
                        </div>
                    </template>
                    <div class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                        LLM cost: <strong>${data.usage.llmCostUsd}</strong> ·
                        Tokens in/out: {data.usage.llmTokensIn} / {data.usage.llmTokensOut}
                    </div>
                </div>
            </template>

            <!-- Question health -->
            <div class="slds-p-around_medium">
                <h3 class="slds-text-title_caps slds-m-bottom_x-small">Question bank health</h3>
                <div class="slds-grid slds-wrap slds-gutters">
                    <template for:each={healthTiles} for:item="h">
                        <div key={h.label} class="slds-col slds-size_1-of-2 slds-medium-size_1-of-6">
                            <div class="slds-box slds-box_x-small">
                                <p class="slds-text-body_small slds-text-color_weak">{h.label}</p>
                                <p class="slds-text-heading_small">{h.value}</p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Top exams + recent activity -->
            <div class="slds-grid slds-wrap slds-gutters slds-p-horizontal_medium">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <h3 class="slds-text-title_caps slds-m-bottom_x-small">Top exams (7d)</h3>
                    <template if:true={hasTopExams}>
                        <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                            <thead><tr>
                                <th>Exam</th><th class="slds-text-align_right">Games</th><th class="slds-text-align_right">Answers</th>
                            </tr></thead>
                            <tbody>
                                <template for:each={data.topExams} for:item="e">
                                    <tr key={e.examId}>
                                        <td>{e.examName}</td>
                                        <td class="slds-text-align_right">{e.games}</td>
                                        <td class="slds-text-align_right">{e.answers}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </template>
                    <template if:false={hasTopExams}>
                        <p class="slds-text-color_weak">No play activity in the last 7 days.</p>
                    </template>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <h3 class="slds-text-title_caps slds-m-bottom_x-small">Recent license events</h3>
                    <template if:true={hasLicense}>
                        <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                            <thead><tr><th>When</th><th>Tenant</th><th>Event</th></tr></thead>
                            <tbody>
                                <template for:each={data.recentLicense} for:item="le">
                                    <tr key={le.id}>
                                        <td><lightning-formatted-date-time value={le.occurredAt} year="numeric" month="short" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time></td>
                                        <td>{le.tenantName}</td>
                                        <td>{le.eventType}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </template>
                    <template if:false={hasLicense}>
                        <p class="slds-text-color_weak">No billing events recorded yet.</p>
                    </template>
                </div>
            </div>

            <!-- Generation jobs + errors -->
            <div class="slds-grid slds-wrap slds-gutters slds-p-horizontal_medium slds-p-top_medium">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <h3 class="slds-text-title_caps slds-m-bottom_x-small">Recent generation jobs</h3>
                    <template if:true={hasGenerations}>
                        <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                            <thead><tr><th>When</th><th>Provider</th><th>Status</th><th class="slds-text-align_right">Req/Gen</th><th class="slds-text-align_right">Cost</th></tr></thead>
                            <tbody>
                                <template for:each={data.recentGenerations} for:item="g">
                                    <tr key={g.id}>
                                        <td><lightning-formatted-date-time value={g.createdAt} year="numeric" month="short" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time></td>
                                        <td>{g.provider}</td>
                                        <td>{g.status}</td>
                                        <td class="slds-text-align_right">{g.requested}/{g.generated}</td>
                                        <td class="slds-text-align_right">${g.costUsd}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </template>
                    <template if:false={hasGenerations}>
                        <p class="slds-text-color_weak">No generation jobs yet.</p>
                    </template>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <h3 class="slds-text-title_caps slds-m-bottom_x-small">Recent errors / warnings</h3>
                    <template if:true={hasErrors}>
                        <ul class="slds-has-dividers_around-space">
                            <template for:each={data.recentErrors} for:item="er">
                                <li key={er.id} class="slds-item slds-p-around_x-small">
                                    <span class="slds-badge">{er.level}</span>
                                    <strong class="slds-m-left_x-small">{er.className}.{er.methodName}</strong>
                                    <div class="slds-text-color_weak slds-text-body_small">
                                        <lightning-formatted-date-time value={er.occurredAt} year="numeric" month="short" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                                    </div>
                                    <div class="slds-text-body_small">{er.message}</div>
                                </li>
                            </template>
                        </ul>
                    </template>
                    <template if:false={hasErrors}>
                        <p class="slds-text-color_weak">No recent errors. :tada:</p>
                    </template>
                </div>
            </div>

            <!-- Tenants list (only when not scoped) -->
            <template if:true={hasTenants}>
                <div class="slds-p-around_medium">
                    <h3 class="slds-text-title_caps slds-m-bottom_x-small">Tenants</h3>
                    <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                        <thead><tr>
                            <th>Workspace</th><th>Plan</th><th>Status</th>
                            <th class="slds-text-align_right">Players</th>
                            <th class="slds-text-align_right">Study plans</th>
                            <th class="slds-text-align_right">Q this period</th>
                            <th class="slds-text-align_right">Est. MRR</th>
                            <th>Trial ends</th>
                        </tr></thead>
                        <tbody>
                            <template for:each={data.tenants} for:item="t">
                                <tr key={t.id}>
                                    <td>{t.name}<div class="slds-text-color_weak slds-text-body_small">{t.slackTeamId}</div></td>
                                    <td><lightning-badge label={t.plan}></lightning-badge></td>
                                    <td>{t.status}</td>
                                    <td class="slds-text-align_right">{t.playerCount}</td>
                                    <td class="slds-text-align_right">{t.activeStudyPlans}</td>
                                    <td class="slds-text-align_right">{t.questionsThisPeriod}</td>
                                    <td class="slds-text-align_right">${t.mrrUsd}</td>
                                    <td><lightning-formatted-date-time value={t.trialEndsAt}></lightning-formatted-date-time></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
        </template>

        <template if:true={error}>
            <div class="slds-p-around_medium slds-text-color_error">{error}</div>
        </template>
    </lightning-card>
</template>
