name: Deploy to Scratch Org

on:
  workflow_dispatch:
    inputs:
      org_alias:
        description: 'Scratch org alias'
        required: true
        default: 'certgame'
      duration:
        description: 'Duration in days'
        required: false
        default: '30'

jobs:
  deploy:
    name: Deploy to Scratch Org
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli@latest
          sf version

      - name: Authorize Dev Hub
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "$SFDX_AUTH_URL" > ./SFDX_AUTH_URL.txt
          sf org login sfdx-url --sfdx-url-file ./SFDX_AUTH_URL.txt --alias devhub --set-default-dev-hub
          rm -f ./SFDX_AUTH_URL.txt

      - name: Create Scratch Org
        id: create-org
        run: |
          sf org create scratch --definition-file config/project-scratch-def.json --alias ${{ github.event.inputs.org_alias }} --duration-days ${{ github.event.inputs.duration }} --set-default --wait 10

      - name: Deploy Source
        id: deploy
        run: |
          sf project deploy start --target-org ${{ github.event.inputs.org_alias }} --wait 10

      - name: Assign Permission Set
        run: |
          sf org assign permsetgroup --name Cert_Game_All_Admin --target-org ${{ github.event.inputs.org_alias }} || echo "Permission set group not found, skipping"

      - name: Get Org URL
        id: org-url
        run: |
          ORG_URL=$(sf org open --target-org ${{ github.event.inputs.org_alias }} --url-only)
          echo "url=$ORG_URL" >> $GITHUB_OUTPUT

      - name: Notify Slack - Success
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🚀 Scratch Org Deployed Successfully",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Scratch Org Deployed Successfully",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Org Alias:*\n${{ github.event.inputs.org_alias }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Duration:*\n${{ github.event.inputs.duration }} days"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Deployed By:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ All components deployed successfully"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack - Failure
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "❌ Scratch Org Deployment Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Scratch Org Deployment Failed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Org Alias:*\n${{ github.event.inputs.org_alias }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Deployed By:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "⚠️ Deployment failed. Check the workflow logs for details."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Failed Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "style": "danger"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
