name: Deploy

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target_alias:
        description: Alias to assign to the resolved target org for this run.
        required: false
        default: production-target

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to target org
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ github.event_name == 'release' && 'production' || 'main' }}

    env:
      TARGET_ALIAS: ${{ github.event.inputs.target_alias || format('ci-ephemeral-{0}', github.run_id) }}
      DEVHUB_ALIAS: devhub-ci

    outputs:
      scratchCreated: ${{ steps.org.outputs.scratchCreated }}

    steps:
      - name: Preflight — required secrets present
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          missing=""
          [ -z "${SFDX_AUTH_URL:-}" ] && missing="$missing SFDX_AUTH_URL"
          [ -z "${SLACK_WEBHOOK_URL:-}" ] && missing="$missing SLACK_WEBHOOK_URL"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
              curl -sS -X POST -H 'Content-Type: application/json' \
                --data "{\"text\":\"❌ deploy aborted: missing secrets$missing\"}" \
                "$SLACK_WEBHOOK_URL" || true
            fi
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Salesforce CLI
        run: |
          set -euo pipefail
          npm install --global @salesforce/cli
          sf --version

      - name: Count changed files (informational)
        id: diff
        run: |
          set -euo pipefail
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.sha }}'
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            COUNT="$(git ls-files | wc -l | tr -d ' ')"
          else
            COUNT="$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null | wc -l | tr -d ' ' || echo 0)"
          fi
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Notify Slack — start
        uses: ./.github/actions/slack-notify
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: start
          title: Production deploy
          workflow_label: deploy / deploy
          extra_fields: |
            [
              { "label": "Environment", "value": "${{ github.event_name == 'release' && 'production' || 'main' }}" },
              { "label": "Target",      "value": "${{ secrets.SFDX_AUTH_URL_SCRATCH != '' && 'pre-provisioned org' || 'ephemeral scratch' }}" },
              { "label": "Files changed", "value": "${{ steps.diff.outputs.count }}" }
            ]

      - name: Authorize Dev Hub
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          set -euo pipefail
          printf '%s' "$SFDX_AUTH_URL" > ./DEVHUB_AUTH.txt
          sf org login sfdx-url -f ./DEVHUB_AUTH.txt -a "$DEVHUB_ALIAS" -d
          rm -f ./DEVHUB_AUTH.txt

      - name: Resolve target org
        id: org
        env:
          SFDX_AUTH_URL_SCRATCH: ${{ secrets.SFDX_AUTH_URL_SCRATCH }}
        run: |
          set -euo pipefail
          if [ -n "${SFDX_AUTH_URL_SCRATCH:-}" ]; then
            printf '%s' "$SFDX_AUTH_URL_SCRATCH" > ./TARGET_AUTH.txt
            sf org login sfdx-url -f ./TARGET_AUTH.txt -a "$TARGET_ALIAS"
            rm -f ./TARGET_AUTH.txt
            echo "scratchCreated=false" >> "$GITHUB_OUTPUT"
          else
            sf org create scratch \
              -f config/project-scratch-def.json \
              -a "$TARGET_ALIAS" \
              -y 1 \
              -w 30
            echo "scratchCreated=true" >> "$GITHUB_OUTPUT"
          fi
          TARGET_USER="$(sf org display -o "$TARGET_ALIAS" --json | jq -r '.result.username // empty')"
          echo "username=$TARGET_USER" >> "$GITHUB_OUTPUT"

      - name: Deploy source
        id: deploy
        run: |
          set -euo pipefail
          mkdir -p reports
          set +e
          sf project deploy start \
            -o "$TARGET_ALIAS" \
            -w 90 \
            --verbose \
            --json > reports/deploy.json 2> reports/deploy.err
          DEPLOY_EXIT=$?
          set -e
          DEPLOY_ID="$(jq -r '.result.id // .result.deployId // empty' reports/deploy.json 2>/dev/null || echo '')"
          echo "deployId=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          tail -n 80 reports/deploy.json 2>/dev/null || true
          exit $DEPLOY_EXIT

      - name: Run Apex tests
        id: tests
        run: |
          set -euo pipefail
          mkdir -p reports
          sf apex run test \
            -o "$TARGET_ALIAS" \
            -l RunLocalTests \
            -w 60 \
            -c \
            -r human || true
          sf apex run test \
            -o "$TARGET_ALIAS" \
            -l RunLocalTests \
            -w 60 \
            -c \
            -r json > reports/tests.json || true
          PASS="$(jq -r '.result.summary.passing // 0' reports/tests.json)"
          FAIL="$(jq -r '.result.summary.failing // 0' reports/tests.json)"
          COV="$(jq -r '.result.summary.testRunCoverage // .result.summary.orgWideCoverage // "n/a"' reports/tests.json)"
          echo "pass=$PASS" >> "$GITHUB_OUTPUT"
          echo "fail=$FAIL" >> "$GITHUB_OUTPUT"
          echo "coverage=$COV" >> "$GITHUB_OUTPUT"
          if [ "$FAIL" != "0" ]; then
            echo "::error::$FAIL Apex tests failed"
            exit 1
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-reports-${{ github.run_id }}
          path: reports/
          if-no-files-found: ignore

      - name: Notify Slack — success
        if: success()
        uses: ./.github/actions/slack-notify
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: success
          title: Production deploy
          workflow_label: deploy / deploy
          extra_fields: |
            [
              { "label": "Environment",  "value": "${{ github.event_name == 'release' && 'production' || 'main' }}" },
              { "label": "Target org",   "value": "${{ env.TARGET_ALIAS }}" },
              { "label": "Target user",  "value": "${{ steps.org.outputs.username || 'n/a' }}" },
              { "label": "Deploy ID",    "value": "${{ steps.deploy.outputs.deployId || 'n/a' }}" },
              { "label": "Tests",        "value": "${{ steps.tests.outputs.pass }} passed / ${{ steps.tests.outputs.fail }} failed" },
              { "label": "Coverage",     "value": "${{ steps.tests.outputs.coverage }}" },
              { "label": "Files changed","value": "${{ steps.diff.outputs.count }}" }
            ]

      - name: Capture failure log tail
        if: failure()
        id: failtail
        run: |
          set -euo pipefail
          {
            echo "----- deploy stderr (tail) -----"
            tail -n 50 reports/deploy.err 2>/dev/null || echo "(no deploy.err)"
            echo
            echo "----- deploy.json component failures -----"
            jq -r '.result.details.componentFailures[]? | "\(.fullName) [\(.componentType)]: \(.problem)"' reports/deploy.json 2>/dev/null | tail -n 30 || echo "(no component failures parsed)"
            echo
            echo "----- test failures -----"
            jq -r '.result.tests[]? | select(.Outcome=="Fail") | "\(.FullName): \(.Message)"' reports/tests.json 2>/dev/null | tail -n 20 || echo "(no test failures parsed)"
          } > reports/failure_tail.txt
          {
            echo 'tail<<EOF'
            tail -c 3500 reports/failure_tail.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack — failure
        if: failure()
        uses: ./.github/actions/slack-notify
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: failure
          title: Production deploy
          workflow_label: deploy / deploy
          extra_fields: |
            [
              { "label": "Environment",  "value": "${{ github.event_name == 'release' && 'production' || 'main' }}" },
              { "label": "Target org",   "value": "${{ env.TARGET_ALIAS }}" },
              { "label": "Deploy ID",    "value": "${{ steps.deploy.outputs.deployId || 'n/a' }}" },
              { "label": "Tests",        "value": "${{ steps.tests.outputs.pass || '0' }} passed / ${{ steps.tests.outputs.fail || '?' }} failed" },
              { "label": "Coverage",     "value": "${{ steps.tests.outputs.coverage || 'n/a' }}" }
            ]
          log_tail: ${{ steps.failtail.outputs.tail }}

      - name: Cleanup — delete ephemeral scratch org
        if: always() && steps.org.outputs.scratchCreated == 'true'
        id: cleanup
        run: |
          set -euo pipefail
          if sf org delete scratch -o "$TARGET_ALIAS" -p; then
            echo "deleted=true" >> "$GITHUB_OUTPUT"
          else
            echo "deleted=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Failed to delete scratch org $TARGET_ALIAS"
          fi

      - name: Notify Slack — cleanup
        if: always() && steps.org.outputs.scratchCreated == 'true'
        uses: ./.github/actions/slack-notify
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: cleanup
          title: Scratch org cleanup
          workflow_label: deploy / cleanup
          extra_fields: |
            [
              { "label": "Org",     "value": "${{ env.TARGET_ALIAS }}" },
              { "label": "Deleted", "value": "${{ steps.cleanup.outputs.deleted || 'false' }}" }
            ]
